name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install project
        run: python -m pip install -e ".[client,dev]"

      - name: Lint
        run: ruff check app2api tests scripts

      - name: Check formatting
        run: ruff format --check app2api tests scripts

      - name: Run tests
        run: pytest -q

      - name: Build package
        run: python -m build
